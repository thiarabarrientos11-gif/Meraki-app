<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>MERAKI · Inventario</title>

<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0A0A0A" />
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="icon" href="icons/icon-192.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --negro:#0A0A0A; --surface:#131313; --surface2:#1A1A1A;
    --borde:#2C2C2C; --borde2:#383838;
    --oro:#D4AF37; --oro-dk:#AA8A2A;
    --perla:#F0EAD6; --perla-dim:#8E8A82;
    --rojo:#C44B4B; --rojo-lt:#E07070;
    --verde:#4B8C5A; --verde-lt:#72C484;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; background:var(--negro); color:var(--perla);
    font-family:'Inter',sans-serif; height:100%; overflow:hidden; }
  #app{ height:100vh; display:flex; flex-direction:column; }

  .brand{ font-family:'Cormorant Garamond',serif; letter-spacing:.12em; }

  /* ---------- HEADER ---------- */
  header{ padding: calc(14px + var(--safe-top)) 18px 12px; background:var(--surface);
    border-bottom:1px solid var(--borde); flex-shrink:0; }
  .htop{ display:flex; align-items:center; justify-content:space-between; }
  .htop h1{ font-size:22px; font-weight:600; color:var(--oro); margin:0; }
  .htop .gem{ width:14px; height:14px; margin-right:8px; display:inline-block;
    background:var(--oro); clip-path: polygon(20% 0%, 80% 0%, 100% 38%, 50% 100%, 0% 38%); }
  .sub{ font-size:10.5px; letter-spacing:.14em; color:var(--perla-dim); margin-top:2px; text-transform:uppercase; }

  .stats{ display:flex; gap:10px; overflow-x:auto; margin-top:14px; padding-bottom:2px; }
  .stat{ flex:1 0 auto; min-width:84px; background:var(--surface2); border:1px solid var(--borde);
    border-radius:10px; padding:8px 12px; text-align:center; }
  .stat b{ display:block; font-size:17px; color:var(--oro); font-weight:700; }
  .stat span{ font-size:9px; color:var(--perla-dim); letter-spacing:.08em; text-transform:uppercase; }

  /* ---------- TOOLBAR ---------- */
  .toolbar{ padding:12px 16px; background:var(--negro); flex-shrink:0; border-bottom:1px solid var(--borde); }
  .search{ display:flex; align-items:center; background:var(--surface2); border:1px solid var(--borde2);
    border-radius:10px; padding:0 12px; height:42px; }
  .search input{ flex:1; background:none; border:none; outline:none; color:var(--perla);
    font-family:'Inter'; font-size:14.5px; margin-left:8px; }
  .search input::placeholder{ color:var(--perla-dim); }
  .filters{ display:flex; gap:8px; margin-top:10px; overflow-x:auto; }
  .filters select{ background:var(--surface2); color:var(--perla); border:1px solid var(--borde2);
    border-radius:8px; padding:7px 8px; font-size:12.5px; font-family:'Inter'; flex-shrink:0; }

  /* ---------- LIST ---------- */
  main{ flex:1; overflow-y:auto; padding:12px 16px calc(90px + var(--safe-bottom)); }
  .count{ font-size:11.5px; color:var(--perla-dim); margin:4px 2px 10px; }
  .card{ background:var(--surface); border:1px solid var(--borde); border-radius:12px;
    padding:14px; margin-bottom:10px; display:flex; gap:12px; align-items:center; }
  .card .info{ flex:1; min-width:0; }
  .card .row1{ display:flex; justify-content:space-between; gap:8px; }
  .card .nombre{ font-size:15px; font-weight:600; color:var(--perla);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card .precio{ font-size:14px; font-weight:700; color:var(--oro); flex-shrink:0; }
  .card .meta{ font-size:11.5px; color:var(--perla-dim); margin-top:4px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .badge{ display:inline-block; padding:2px 8px; border-radius:20px; font-size:10.5px;
    font-weight:600; margin-top:6px; }
  .badge.ok{ background:rgba(75,140,90,.18); color:var(--verde-lt); }
  .badge.low{ background:rgba(232,176,96,.16); color:#E8B060; }
  .badge.zero{ background:rgba(255,255,255,.06); color:#777; }
  .empty{ text-align:center; color:var(--perla-dim); padding:60px 20px; font-size:13.5px; }

  /* ---------- FAB ---------- */
  .fab{ position:fixed; right:18px; bottom:calc(86px + var(--safe-bottom)); width:54px; height:54px;
    background:var(--oro); color:var(--negro); border:none; font-size:26px; font-weight:700;
    clip-path: polygon(20% 0%, 80% 0%, 100% 35%, 50% 100%, 0% 35%);
    display:flex; align-items:center; justify-content:center; padding-bottom:8px;
    box-shadow:0 6px 18px rgba(212,175,55,.35); z-index:20; }

  /* ---------- BOTTOM NAV ---------- */
  nav{ position:fixed; left:0; right:0; bottom:0; background:var(--surface);
    border-top:1px solid var(--borde); display:flex; padding-bottom:var(--safe-bottom); z-index:15; }
  nav button{ flex:1; background:none; border:none; padding:11px 0 9px; color:var(--perla-dim);
    font-family:'Inter'; font-size:11px; display:flex; flex-direction:column; align-items:center; gap:3px; }
  nav button .ic{ width:18px; height:18px; opacity:.6; }
  nav button.active{ color:var(--oro); }
  nav button.active .ic{ opacity:1; }

  /* ---------- SHEET (modal) ---------- */
  .overlay{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:30; display:none; }
  .overlay.show{ display:block; }
  .sheet{ position:fixed; left:0; right:0; bottom:0; max-height:88vh; background:var(--surface);
    border-radius:18px 18px 0 0; border-top:1px solid var(--borde2); z-index:31;
    transform:translateY(100%); transition:transform .25s ease; display:flex; flex-direction:column; }
  .sheet.show{ transform:translateY(0); }
  .sheet .handle{ width:38px; height:4px; background:var(--borde2); border-radius:4px; margin:10px auto 4px; }
  .sheet header{ background:none; border:none; padding:6px 20px 12px; display:flex; justify-content:space-between; align-items:center; }
  .sheet header h2{ font-size:18px; color:var(--oro); margin:0; font-family:'Cormorant Garamond',serif; font-weight:600; }
  .sheet header .x{ color:var(--perla-dim); font-size:22px; background:none; border:none; padding:4px; }
  .sheet form{ overflow-y:auto; padding:0 20px 24px; }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:10.5px; letter-spacing:.08em; color:var(--perla-dim);
    text-transform:uppercase; margin-bottom:5px; }
  .field input, .field select, .field textarea{ width:100%; background:var(--surface2); color:var(--perla);
    border:1px solid var(--borde2); border-radius:9px; padding:11px 12px; font-size:14.5px; font-family:'Inter'; }
  .field textarea{ resize:vertical; min-height:60px; }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stockbox{ display:flex; align-items:center; justify-content:space-between; background:var(--surface2);
    border:1px solid var(--borde2); border-radius:9px; padding:10px 12px; margin-bottom:14px; }
  .stockbox .lbl{ font-size:12px; color:var(--perla-dim); }
  .stepper{ display:flex; align-items:center; gap:10px; }
  .stepper button{ width:32px; height:32px; border-radius:8px; border:1px solid var(--borde2);
    background:var(--surface); color:var(--oro); font-size:18px; font-weight:700; }
  .stepper input{ width:52px; text-align:center; background:none; border:none; color:var(--perla);
    font-size:17px; font-weight:700; }
  .btnrow{ display:flex; gap:10px; margin-top:6px; }
  .btn{ flex:1; padding:13px; border-radius:10px; border:none; font-family:'Inter'; font-weight:600;
    font-size:14px; text-align:center; }
  .btn.primary{ background:var(--oro); color:var(--negro); }
  .btn.secondary{ background:transparent; border:1px solid var(--borde2); color:var(--perla-dim); }
  .btn.danger{ background:rgba(196,75,75,.12); border:1px solid #5A2020; color:var(--rojo-lt); }
  .msg{ font-size:12.5px; margin-top:8px; min-height:16px; }
  .msg.err{ color:var(--rojo-lt); } .msg.ok{ color:var(--verde-lt); }

  /* toast */
  #toast{ position:fixed; top:calc(14px + var(--safe-top)); left:50%; transform:translateX(-50%) translateY(-30px);
    background:var(--surface2); border:1px solid var(--borde2); color:var(--perla); padding:10px 18px;
    border-radius:10px; font-size:13px; z-index:50; opacity:0; transition:all .25s ease; pointer-events:none; }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* install banner */
  #installBar{ position:fixed; left:14px; right:14px; bottom:calc(78px + var(--safe-bottom)); z-index:25;
    background:var(--surface2); border:1px solid var(--oro-dk); border-radius:12px; padding:11px 14px;
    display:none; align-items:center; justify-content:space-between; gap:10px; }
  #installBar.show{ display:flex; }
  #installBar span{ font-size:12.5px; color:var(--perla); }
  #installBar button{ background:var(--oro); color:var(--negro); border:none; border-radius:8px;
    padding:7px 12px; font-size:12px; font-weight:700; flex-shrink:0; }

  .spinner{ text-align:center; padding:40px; color:var(--perla-dim); font-size:13px; }

  /* ---------- FOTO ---------- */
  .card-thumb{ width:58px; height:58px; border-radius:10px; object-fit:cover;
    border:1px solid var(--borde2); flex-shrink:0; background:var(--surface2); }
  .card-thumb-placeholder{ width:58px; height:58px; border-radius:10px; flex-shrink:0;
    background:var(--surface2); border:1px solid var(--borde2);
    display:flex; align-items:center; justify-content:center;
    color:var(--borde2); font-size:22px; }
  .foto-preview-wrap{ position:relative; margin-bottom:14px; }
  .foto-preview{ width:100%; max-height:200px; object-fit:cover; border-radius:12px;
    border:1px solid var(--borde2); display:none; }
  .foto-preview.show{ display:block; }
  .foto-btn{ display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:12px; background:var(--surface2); border:1px dashed var(--borde2);
    border-radius:10px; color:var(--perla-dim); font-size:13.5px; font-family:'Inter'; }
  .foto-btn:active{ background:var(--borde); }
  .foto-quitar{ position:absolute; top:8px; right:8px; background:rgba(0,0,0,.6);
    border:none; color:var(--perla); border-radius:50%; width:28px; height:28px;
    font-size:14px; display:none; align-items:center; justify-content:center; }
  .foto-quitar.show{ display:flex; }

  /* sheet foto grande */
  .foto-full-wrap{ position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:60;
    display:none; align-items:center; justify-content:center; flex-direction:column; gap:16px; }
  .foto-full-wrap.show{ display:flex; }
  .foto-full-wrap img{ max-width:92vw; max-height:75vh; object-fit:contain; border-radius:12px; }
  .foto-full-wrap button{ background:var(--surface2); border:1px solid var(--borde2);
    color:var(--perla); padding:10px 24px; border-radius:10px; font-size:14px; font-family:'Inter'; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="htop">
      <h1><span class="gem"></span><span class="brand">MERAKI</span></h1>
    </div>
    <div class="sub">Alta joyería · Inventario en la nube</div>
    <div class="stats">
      <div class="stat"><b id="stPiezas">0</b><span>Piezas</span></div>
      <div class="stat"><b id="stValor">₲0</b><span>Valor</span></div>
      <div class="stat"><b id="stCats">0</b><span>Categorías</span></div>
      <div class="stat"><b id="stBajo">0</b><span>Stock bajo</span></div>
    </div>
  </header>

  <div class="toolbar" id="viewInventario">
    <div class="search">
      <span style="color:var(--perla-dim)">⌕</span>
      <input id="busqueda" placeholder="Buscar por nombre, SKU, material, gema..." />
    </div>
    <div class="filters">
      <select id="fCat"><option value="Todas">Categoría: Todas</option></select>
      <select id="fLocal"><option value="Todos">Local: Todos</option></select>
      <select id="fStock">
        <option value="">Stock: Todo</option>
        <option value="bajo">Stock bajo</option>
        <option value="cero">Sin stock</option>
        <option value="ok">Stock normal</option>
      </select>
    </div>
  </div>

  <main id="mainInventario">
    <div class="count" id="count"></div>
    <div id="list"><div class="spinner">Cargando inventario…</div></div>
  </main>

  <main id="mainMovimientos" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <div class="count" style="margin:0;">Historial de movimientos recientes</div>
      <button class="btn primary" id="btnNuevoMov" style="padding:8px 14px; font-size:13px; border-radius:9px; flex:none;">+ Registrar</button>
    </div>
    <div id="listMov"><div class="spinner">Cargando movimientos…</div></div>
  </main>

  <button class="fab" id="btnAdd">+</button>

  <div id="installBar">
    <span>Instalá MERAKI como app en tu celular</span>
    <button id="btnInstall">Instalar</button>
  </div>

  <nav>
    <button class="active" data-view="inventario">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Inventario
    </button>
    <button data-view="movimientos">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 12h4l3 8 4-16 3 8h4"/></svg>
      Movimientos
    </button>
  </nav>

</div>

<div id="overlay" class="overlay"></div>

<!-- SHEET: Agregar / Editar pieza -->
<div id="sheetItem" class="sheet">
  <div class="handle"></div>
  <header>
    <h2 id="sheetItemTitle">Nueva Joya</h2>
    <button class="x" id="closeItemSheet">✕</button>
  </header>
  <form id="formItem" onsubmit="return false;">
    <div class="field"><label>Nombre de la pieza *</label><input id="f_nombre" required /></div>
    <div class="grid2">
      <div class="field"><label>SKU / Código</label><input id="f_sku" /></div>
      <div class="field"><label>Categoría</label><select id="f_categoria"></select></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Material</label><input id="f_material" /></div>
      <div class="field"><label>Piedra / Gema</label><input id="f_piedra" /></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Costo</label><input id="f_costo" type="number" step="0.01" /></div>
      <div class="field"><label>Precio Venta *</label><input id="f_precio" type="number" step="0.01" required /></div>
    </div>
    <div class="field"><label>Local</label><select id="f_local"></select></div>

    <div class="stockbox">
      <div>
        <div class="lbl">Stock</div>
      </div>
      <div class="stepper">
        <button type="button" id="stockMenos">–</button>
        <input id="f_stock" type="number" value="0" />
        <button type="button" id="stockMas">+</button>
      </div>
    </div>

    <div class="field"><label>Stock mínimo (alerta)</label><input id="f_stockmin" type="number" value="2" /></div>
    <div class="field"><label>Proveedor</label><input id="f_proveedor" /></div>
    <div class="field"><label>Notas</label><textarea id="f_notas"></textarea></div>

    <!-- FOTO -->
    <div class="field">
      <label>Foto de la joya</label>
      <div class="foto-preview-wrap">
        <img id="fotoPreview" class="foto-preview" />
        <button type="button" class="foto-quitar" id="fotoQuitar">✕</button>
      </div>
      <input type="file" id="fotoInput" accept="image/*" style="display:none" />
      <button type="button" class="foto-btn" id="fotoBtnLabel">
        <span style="font-size:18px">📷</span> Elegir foto de galería
      </button>
      <div class="msg" id="fotoMsg"></div>
    </div>

    <div class="msg" id="itemMsg"></div>
    <div class="btnrow">
      <button class="btn danger" id="btnDeleteItem" style="display:none;">Eliminar</button>
      <button class="btn primary" id="btnSaveItem">Guardar</button>
    </div>
  </form>
</div>

<!-- SHEET: Registrar Movimiento -->
<div id="sheetMov" class="sheet">
  <div class="handle"></div>
  <header>
    <h2>Registrar Movimiento</h2>
    <button class="x" id="closeMovSheet">✕</button>
  </header>
  <form id="formMov" onsubmit="return false;" style="overflow-y:auto; padding:0 20px 24px;">

    <div class="field">
      <label>Pieza</label>
      <select id="mov_item"></select>
    </div>

    <div class="field">
      <label>Tipo</label>
      <div style="display:flex; gap:10px; margin-top:4px;">
        <button type="button" id="movBtnEntrada" class="btn primary" style="flex:1; padding:11px;">▲ Entrada</button>
        <button type="button" id="movBtnSalida" class="btn secondary" style="flex:1; padding:11px;">▼ Salida</button>
      </div>
    </div>

    <div class="stockbox" style="margin-bottom:14px;">
      <div class="lbl">Cantidad</div>
      <div class="stepper">
        <button type="button" id="movMenos">–</button>
        <input id="mov_cantidad" type="number" value="1" min="1" style="width:52px; text-align:center; background:none; border:none; color:var(--perla); font-size:17px; font-weight:700;" />
        <button type="button" id="movMas">+</button>
      </div>
    </div>

    <div class="field">
      <label>Motivo</label>
      <select id="mov_motivo"></select>
    </div>

    <div class="field">
      <label>Referencia (opcional)</label>
      <input id="mov_ref" placeholder="Ej. Factura #042" />
    </div>

    <div id="movPreview" style="background:var(--surface2); border:1px solid var(--borde2); border-radius:9px; padding:10px 14px; margin-bottom:14px; font-size:13px; color:var(--perla-dim); display:none;">
      Stock actual: <b id="movStockActual" style="color:var(--perla)">—</b> → <b id="movStockNuevo" style="color:var(--oro)">—</b>
    </div>

    <div class="msg" id="movMsg"></div>
    <div class="btnrow">
      <button class="btn secondary" id="btnCancelMov">Cancelar</button>
      <button class="btn primary" id="btnSaveMov">Aplicar</button>
    </div>
  </form>
</div>

<div id="toast"></div>

<!-- Visor foto grande -->
<div class="foto-full-wrap" id="fotoFullWrap">
  <img id="fotoFullImg" src="" />
  <button id="fotoFullClose">Cerrar</button>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG SUPABASE (mismo proyecto que la app de escritorio)
   ══════════════════════════════════════════════════════════ */
const SUPABASE_URL = "https://kfdjctoquoxrfvfeljic.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmZGpjdG9xdW94cmZ2ZmVsamljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MTAzNjMsImV4cCI6MjA5NzM4NjM2M30.B6OeYJxIc9YjtWYRlzGlWvxMEzp2MdbFEUIyX-IAhkE";
const HEADERS = {
  "apikey": SUPABASE_KEY,
  "Authorization": "Bearer " + SUPABASE_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=representation"
};
const LOCALES = ["Joseph", "Paraguay Alta Moda", "Lara Mikal", "Stock Local"];
const LOCAL_DEFAULT = "Stock Local";

async function sbGet(table, params){
  const url = new URL(`${SUPABASE_URL}/rest/v1/${table}`);
  if(params) Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  const r = await fetch(url, { headers: HEADERS });
  if(!r.ok) return [];
  return r.json();
}
async function sbPost(table, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method:"POST", headers: HEADERS, body: JSON.stringify(data) });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbPatch(table, filtro, data){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filtro}`, { method:"PATCH", headers: HEADERS, body: JSON.stringify(data) });
  if(!r.ok) throw new Error(await r.text());
  return r.ok;
}
async function sbDelete(table, filtro){
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filtro}`, { method:"DELETE", headers: HEADERS });
  return r.ok;
}

/* ---------- estado ---------- */
let inv = [];        // datos crudos de inventario
let categorias = [];
let editId = null;    // si no es null, el sheet está en modo edición

function fmtPrecio(v){
  if(v === null || v === undefined || v === "") return "—";
  const n = Number(v);
  if(isNaN(n)) return "—";
  return "₲ " + Math.round(n).toLocaleString("es-PY").replace(/,/g,".");
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2200);
}

/* ---------- carga ---------- */
async function cargarTodo(){
  try{
    const [invRows, catRows] = await Promise.all([
      sbGet("inventario", {order:"nombre"}),
      sbGet("categorias", {order:"nombre"})
    ]);
    inv = Array.isArray(invRows) ? invRows : [];
    categorias = Array.isArray(catRows) ? catRows.map(c=>c.nombre) : [];
    fillSelects();
    render();
  }catch(e){
    document.getElementById("list").innerHTML = `<div class="empty">No se pudo conectar.<br>Verificá tu internet.</div>`;
  }
}

function fillSelects(){
  const fCat = document.getElementById("fCat");
  fCat.innerHTML = `<option value="Todas">Categoría: Todas</option>` +
    categorias.map(c=>`<option value="${c}">${c}</option>`).join("");

  const fLocal = document.getElementById("fLocal");
  fLocal.innerHTML = `<option value="Todos">Local: Todos</option>` +
    LOCALES.map(l=>`<option value="${l}">${l}</option>`).join("");

  const fc = document.getElementById("f_categoria");
  fc.innerHTML = `<option value="">—</option>` + categorias.map(c=>`<option value="${c}">${c}</option>`).join("");

  const fl = document.getElementById("f_local");
  fl.innerHTML = LOCALES.map(l=>`<option value="${l}">${l}</option>`).join("");
}

/* ---------- filtrado + render ---------- */
function filtrar(){
  const b = document.getElementById("busqueda").value.trim().toLowerCase();
  const cat = document.getElementById("fCat").value;
  const local = document.getElementById("fLocal").value;
  const stockf = document.getElementById("fStock").value;

  return inv.filter(r=>{
    if(b){
      const hay = [r.nombre, r.sku, r.material, r.piedra, r.locales||LOCAL_DEFAULT]
        .some(v => (v||"").toLowerCase().includes(b));
      if(!hay) return false;
    }
    if(cat !== "Todas" && r.categoria !== cat) return false;
    if(local !== "Todos" && (r.locales||LOCAL_DEFAULT) !== local) return false;
    const st = r.stock||0, sm = r.stock_min||2;
    if(stockf === "bajo" && !(st>0 && st<=sm)) return false;
    if(stockf === "cero" && st !== 0) return false;
    if(stockf === "ok" && !(st>sm)) return false;
    return true;
  });
}

function render(){
  const rows = filtrar();
  document.getElementById("count").textContent = `${rows.length} pieza${rows.length!==1?"s":""}`;

  // stats sobre TODO el inventario (no solo filtrado), igual que la app de escritorio
  const totalPiezas = inv.reduce((a,r)=>a+(r.stock||0),0);
  const valor = inv.reduce((a,r)=>a+((r.precio_venta||0)*(r.stock||0)),0);
  const cats = new Set(inv.map(r=>r.categoria).filter(Boolean)).size;
  const bajo = inv.filter(r=> (r.stock||0)>0 && (r.stock||0)<=(r.stock_min||2)).length;
  document.getElementById("stPiezas").textContent = totalPiezas.toLocaleString("es-PY");
  document.getElementById("stValor").textContent = fmtPrecio(valor);
  document.getElementById("stCats").textContent = cats;
  document.getElementById("stBajo").textContent = bajo;

  const list = document.getElementById("list");
  if(rows.length === 0){
    list.innerHTML = `<div class="empty">Sin resultados.<br>Probá otra búsqueda o filtro.</div>`;
    return;
  }
  list.innerHTML = rows.map(r=>{
    const st = r.stock||0, sm = r.stock_min||2;
    let badge = `<span class="badge ok">Stock ${st}</span>`;
    if(st===0) badge = `<span class="badge zero">Sin stock</span>`;
    else if(st<=sm) badge = `<span class="badge low">Stock bajo · ${st}</span>`;
    const thumb = r.foto_url
      ? `<img class="card-thumb" src="${r.foto_url}" loading="lazy" data-foto="${r.foto_url}" />`
      : `<div class="card-thumb-placeholder">💎</div>`;
    return `<div class="card" data-id="${r.id}">
      ${thumb}
      <div class="info">
        <div class="row1">
          <div class="nombre">${r.nombre||"—"}</div>
          <div class="precio">${fmtPrecio(r.precio_venta)}</div>
        </div>
        <div class="meta">${r.sku||"—"} · ${r.categoria||"—"} · ${r.locales||LOCAL_DEFAULT}</div>
        ${badge}
      </div>
    </div>`;
  }).join("");

  list.querySelectorAll(".card").forEach(card=>{
    card.addEventListener("click", (e)=>{
      // Si toca la miniatura, abre foto grande
      const fotoEl = e.target.closest("[data-foto]");
      if(fotoEl){
        document.getElementById("fotoFullImg").src = fotoEl.dataset.foto;
        document.getElementById("fotoFullWrap").classList.add("show");
        return;
      }
      openEdit(Number(card.dataset.id));
    });
  });
}

/* ---------- movimientos ---------- */
async function cargarMovimientos(){
  const el = document.getElementById("listMov");
  el.innerHTML = `<div class="spinner">Cargando…</div>`;
  try{
    const rows = await sbGet("movimientos", {
      order:"fecha.desc", limit:80,
      select:"id,fecha,tipo,cantidad,stock_antes,stock_despues,motivo,inventario(nombre,sku)"
    });
    if(!Array.isArray(rows) || rows.length===0){
      el.innerHTML = `<div class="empty">Sin movimientos registrados.</div>`;
      return;
    }
    el.innerHTML = rows.map(r=>{
      const inv_ = r.inventario || {};
      const signo = r.tipo === "entrada" ? "+" : "−";
      const color = r.tipo === "entrada" ? "var(--verde-lt)" : "var(--rojo-lt)";
      const fecha = new Date(r.fecha).toLocaleString("es-PY", {day:"2-digit",month:"2-digit",year:"2-digit",hour:"2-digit",minute:"2-digit"});
      return `<div class="card" style="cursor:default;">
        <div class="info">
          <div class="row1">
            <div class="nombre">${inv_.nombre||"—"}</div>
            <div class="precio" style="color:${color}">${signo}${r.cantidad}</div>
          </div>
          <div class="meta">${fecha} · ${inv_.sku||"—"}</div>
          <div class="meta">${r.motivo||"—"} · ${r.stock_antes}→${r.stock_despues}</div>
        </div>
      </div>`;
    }).join("");
  }catch(e){
    el.innerHTML = `<div class="empty">No se pudo cargar el historial.</div>`;
  }
}

const sheetItem = document.getElementById("sheetItem");

  document.getElementById("f_categoria").value = r.categoria||"";
  document.getElementById("f_material").value = r.material||"";
  document.getElementById("f_piedra").value = r.piedra||"";
  document.getElementById("f_costo").value = r.precio_costo||"";
  document.getElementById("f_precio").value = r.precio_venta||"";
  document.getElementById("f_local").value = r.locales||LOCAL_DEFAULT;
  document.getElementById("f_stock").value = r.stock||0;
  document.getElementById("f_stockmin").value = r.stock_min||2;
  document.getElementById("f_proveedor").value = r.proveedor||"";

/* ---------- foto ---------- */
window._fotoFile = null;
window._fotoUrlActual = null;

document.getElementById("fotoBtnLabel").addEventListener("click", ()=>{

});

});

document.getElementById("fotoQuitar").addEventListener("click", ()=>{

  window._fotoUrlActual = null;
  document.getElementById("fotoInput").value = "";

  document.getElementById("fotoQuitar").classList.remove("show");
});

document.getElementById("fotoFullClose").addEventListener("click", ()=>{
  document.getElementById("fotoFullWrap").classList.remove("show");
});

async function subirFoto(file, itemId){
  const ext = file.name.split(".").pop() || "jpg";
  const path = `joyas/${itemId}_${Date.now()}.${ext}`;
  const uploadUrl = `${SUPABASE_URL}/storage/v1/object/fotos-joyas/${path}`;
  const r = await fetch(uploadUrl, {
    method: "POST",
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY,
                "Content-Type": file.type },
    body: file
  });
  if(!r.ok) throw new Error("No se pudo subir la foto");
  return `${SUPABASE_URL}/storage/v1/object/public/fotos-joyas/${path}`;
}

document.getElementById("btnSaveItem").addEventListener("click", async ()=>{
  const msg = document.getElementById("itemMsg");
  const nombre = document.getElementById("f_nombre").value.trim();
  const precio = parseFloat(document.getElementById("f_precio").value);
  const stock = parseInt(document.getElementById("f_stock").value || 0);

  if(!nombre || isNaN(precio)){
    msg.textContent = "⚠ Completá nombre y precio de venta."; msg.className="msg err"; return;
  }

  const payload = {
    nombre, sku: document.getElementById("f_sku").value.trim() || null,
    categoria: document.getElementById("f_categoria").value || null,
    material: document.getElementById("f_material").value.trim() || null,
    piedra: document.getElementById("f_piedra").value.trim() || null,
    precio_costo: document.getElementById("f_costo").value ? parseFloat(document.getElementById("f_costo").value) : null,
    precio_venta: precio,
    stock,
    stock_min: parseInt(document.getElementById("f_stockmin").value || 2),
    proveedor: document.getElementById("f_proveedor").value.trim() || null,
    notas: document.getElementById("f_notas").value.trim() || null,
    locales: document.getElementById("f_local").value || LOCAL_DEFAULT,
    moneda: "PYG"
  };

  try{
    let fotoUrl = window._fotoUrlActual || null;

    if(editId){
      const original = inv.find(x=>x.id===editId);
      const stockAntes = original ? (original.stock||0) : stock;
      // subir foto nueva si hay
      if(window._fotoFile){
        document.getElementById("fotoMsg").textContent = "Subiendo foto…";
        fotoUrl = await subirFoto(window._fotoFile, editId);
        document.getElementById("fotoMsg").textContent = "";
      }
      if(fotoUrl !== undefined) payload.foto_url = fotoUrl;
      await sbPatch("inventario", `id=eq.${editId}`, payload);
      if(stockAntes !== stock){
        await sbPost("movimientos", {
          item_id: editId, tipo: stock>stockAntes ? "entrada":"salida",
          cantidad: Math.abs(stock-stockAntes), stock_antes: stockAntes, stock_despues: stock,
          motivo: "Ajuste manual (App móvil)", referencia: "", fecha: new Date().toISOString()
        });
      }
      toast("Pieza actualizada ✓");
    } else {
      const created = await sbPost("inventario", payload);
      const newId = Array.isArray(created) ? created[0].id : null;
      // subir foto si hay
      if(window._fotoFile && newId){
        document.getElementById("fotoMsg").textContent = "Subiendo foto…";
        try{
          fotoUrl = await subirFoto(window._fotoFile, newId);
          await sbPatch("inventario", `id=eq.${newId}`, { foto_url: fotoUrl });
        }catch(fe){ console.warn("Foto no subida:", fe); }
        document.getElementById("fotoMsg").textContent = "";
      }
      if(newId && stock>0){
        await sbPost("movimientos", {
          item_id: newId, tipo: "entrada", cantidad: stock,
          stock_antes: 0, stock_despues: stock,
          motivo: "Ingreso inicial (App móvil)", referencia: "", fecha: new Date().toISOString()
        });
      }
      toast("Pieza agregada ✓");
    }
    hideSheet();
    await cargarTodo();
  }catch(e){
    msg.textContent = "⚠ No se pudo guardar. Revisá tu conexión."; msg.className="msg err";
  }
});

document.getElementById("btnDeleteItem").addEventListener("click", async ()=>{
  if(!editId) return;
  if(!confirm("¿Eliminar esta pieza? Esta acción no se puede deshacer.")) return;
  try{
    await sbDelete("movimientos", `item_id=eq.${editId}`);
    await sbDelete("inventario", `id=eq.${editId}`);
    toast("Pieza eliminada");
    hideSheet();
    await cargarTodo();
  }catch(e){
    document.getElementById("itemMsg").textContent = "⚠ No se pudo eliminar.";
  }
});

/* ---------- sheet movimiento ---------- */
const sheetMov = document.getElementById("sheetMov");
let movTipo = "entrada";
const MOTIVOS_ENTRADA = ["Compra a proveedor","Devolución de cliente","Ajuste de inventario","Otro"];
const MOTIVOS_SALIDA  = ["Venta","Muestra","Consignación","Ajuste de inventario","Otro"];

function showMovSheet(preselectedId = null){
  // llenar select de piezas
  const sel = document.getElementById("mov_item");
  sel.innerHTML = inv.map(r => `<option value="${r.id}" data-stock="${r.stock||0}">${r.nombre}${r.sku ? ' · '+r.sku : ''}</option>`).join("");
  if(preselectedId) sel.value = preselectedId;

  setMovTipo("entrada");
  document.getElementById("mov_cantidad").value = 1;
  document.getElementById("mov_ref").value = "";
  document.getElementById("movMsg").textContent = "";
  actualizarMovPreview();

  overlay.classList.add("show");
  sheetMov.classList.add("show");
}
function hideMovSheet(){
  overlay.classList.remove("show");
  sheetMov.classList.remove("show");
}

function setMovTipo(tipo){
  movTipo = tipo;
  document.getElementById("movBtnEntrada").className = tipo === "entrada" ? "btn primary" : "btn secondary";
  document.getElementById("movBtnSalida").className  = tipo === "salida"  ? "btn primary" : "btn secondary";
  // actualizar motivos
  const motivos = tipo === "entrada" ? MOTIVOS_ENTRADA : MOTIVOS_SALIDA;
  const sel = document.getElementById("mov_motivo");
  sel.innerHTML = motivos.map(m => `<option value="${m}">${m}</option>`).join("");
  actualizarMovPreview();
}

function actualizarMovPreview(){
  const sel = document.getElementById("mov_item");
  const opt = sel.options[sel.selectedIndex];
  if(!opt) return;
  const stockActual = parseInt(opt.dataset.stock || 0);
  const cant = parseInt(document.getElementById("mov_cantidad").value || 0);
  const nuevo = movTipo === "entrada" ? stockActual + cant : stockActual - cant;
  document.getElementById("movStockActual").textContent = stockActual;
  const nuevoEl = document.getElementById("movStockNuevo");
  nuevoEl.textContent = nuevo;
  nuevoEl.style.color = nuevo < 0 ? "var(--rojo-lt)" : "var(--oro)";
  document.getElementById("movPreview").style.display = "block";
}

document.getElementById("movBtnEntrada").addEventListener("click", () => setMovTipo("entrada"));
document.getElementById("movBtnSalida").addEventListener("click",  () => setMovTipo("salida"));
document.getElementById("movMas").addEventListener("click", ()=>{
  const f = document.getElementById("mov_cantidad");
  f.value = (parseInt(f.value||1) + 1);
  actualizarMovPreview();
});
document.getElementById("movMenos").addEventListener("click", ()=>{
  const f = document.getElementById("mov_cantidad");
  f.value = Math.max(1, parseInt(f.value||1) - 1);
  actualizarMovPreview();
});
document.getElementById("mov_item").addEventListener("change", actualizarMovPreview);
document.getElementById("mov_cantidad").addEventListener("input", actualizarMovPreview);

document.getElementById("btnNuevoMov").addEventListener("click", () => showMovSheet());
document.getElementById("closeMovSheet").addEventListener("click", hideMovSheet);
document.getElementById("btnCancelMov").addEventListener("click", hideMovSheet);

document.getElementById("btnSaveMov").addEventListener("click", async () => {
  const msg = document.getElementById("movMsg");
  const sel = document.getElementById("mov_item");
  const itemId = parseInt(sel.value);
  const opt = sel.options[sel.selectedIndex];
  const stockActual = parseInt(opt?.dataset.stock || 0);
  const cant = parseInt(document.getElementById("mov_cantidad").value || 0);
  const motivo = document.getElementById("mov_motivo").value;
  const ref = document.getElementById("mov_ref").value.trim();

  if(!itemId || cant < 1){
    msg.textContent = "⚠ Seleccioná una pieza e ingresá una cantidad válida.";
    msg.className = "msg err"; return;
  }
  if(movTipo === "salida" && cant > stockActual){
    msg.textContent = `⚠ Stock insuficiente (disponible: ${stockActual}).`;
    msg.className = "msg err"; return;
  }

  const nuevo = movTipo === "entrada" ? stockActual + cant : stockActual - cant;

  try{
    await sbPost("movimientos", {
      item_id: itemId, tipo: movTipo, cantidad: cant,
      stock_antes: stockActual, stock_despues: nuevo,
      motivo, referencia: ref, fecha: new Date().toISOString()
    });
    await sbPatch("inventario", `id=eq.${itemId}`, { stock: nuevo });
    toast(`Movimiento registrado ✓  (${movTipo === "entrada" ? "+" : "-"}${cant})`);
    hideMovSheet();
    await cargarTodo();
    cargarMovimientos();
  }catch(e){
    msg.textContent = "⚠ No se pudo guardar."; msg.className = "msg err";
  }
});

/* ---------- init ---------- */
cargarTodo();
setInterval(cargarTodo, 60000); // refresca cada 60s
